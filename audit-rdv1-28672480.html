<title>Fiche Audit RDV1 — Marchéo</title>
<style>
  :root{
    --nuit:#0F2C52; --nuit2:#0A1428; --bleuc:#1B3F6E; --bleu100:#DCE5F0;
    --vert:#5BBE3A; --vertf:#46A02A; --vert100:#DDF3D2;
    --soleil:#F4B942; --soleil100:#FDF2D8;
    --tomate:#E65533; --tomate100:#FDE9E3;
    --violet:#6E4FB0; --violet100:#EEE8FA; --violetf:#5A3E96;
    --creme:#F7F2E8; --cremef:#E5E2D8; --blanc:#FFFFFF;
    --g1:#5A6478; --g2:#8492A6; --g3:#C4CCD9;
    --ff:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --fd:"Manrope",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --r:14px; --rs:10px; --rl:20px;
    --sh:0 4px 16px rgba(15,44,82,.08); --shl:0 12px 40px rgba(15,44,82,.16);
    --touch:52px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:var(--ff);background:var(--creme);color:var(--nuit2);
    font-size:17px;line-height:1.55;-webkit-text-size-adjust:100%;
    overscroll-behavior-y:none;
  }
  h1,h2,h3,.fd{font-family:var(--fd)}
  button{font-family:inherit;cursor:pointer;border:0;background:none}
  input,textarea,select{font-family:inherit;font-size:17px;color:var(--nuit2)}
  ::placeholder{color:var(--g2)}

  /* ───── APP SHELL ───── */
  .app{display:flex;flex-direction:column;min-height:100vh;min-height:100dvh}
  .topbar{
    position:sticky;top:0;z-index:100;background:var(--nuit);color:#fff;
    padding:calc(env(safe-area-inset-top,0px) + 10px) 16px 10px;
    display:flex;align-items:center;gap:14px;box-shadow:0 2px 16px rgba(10,20,40,.25)
  }
  .brand{display:flex;align-items:center;gap:9px;font-family:var(--fd);font-weight:800;font-size:20px;letter-spacing:-.02em}
  .brand .dot{width:11px;height:11px;border-radius:50%;background:var(--vert);box-shadow:0 0 0 4px rgba(91,190,58,.25)}
  .brand small{display:block;font-family:var(--ff);font-weight:600;font-size:11px;letter-spacing:.14em;color:#9FB4D4;text-transform:uppercase}
  .tb-mid{flex:1;min-width:0;text-align:center;font-weight:700;font-size:15px;color:#CDD9EC;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tb-actions{display:flex;align-items:center;gap:8px}
  .tbtn{
    display:flex;align-items:center;gap:7px;height:42px;padding:0 14px;border-radius:11px;
    background:rgba(255,255,255,.10);color:#fff;font-weight:700;font-size:14px;transition:background .15s
  }
  .tbtn:hover{background:rgba(255,255,255,.18)}
  .tbtn.on{background:var(--vert);color:#06270a}
  .tbtn svg{width:18px;height:18px;flex:none}
  .save-ind{font-size:12.5px;font-weight:700;color:#9FB4D4;display:flex;align-items:center;gap:6px;min-width:96px;justify-content:flex-end}
  .save-ind b{width:8px;height:8px;border-radius:50%;background:var(--vert);transition:.3s}
  .save-ind.dirty b{background:var(--soleil)}

  /* progress */
  .progress{height:5px;background:var(--cremef);position:sticky;top:0;z-index:99}
  .progress i{display:block;height:100%;background:linear-gradient(90deg,var(--vert),var(--soleil));width:0;transition:width .4s var(--ff,ease)}

  /* section nav */
  .nav{
    position:sticky;z-index:98;background:var(--blanc);border-bottom:1px solid var(--cremef);
    display:flex;gap:8px;overflow-x:auto;padding:11px 14px;scrollbar-width:none;-webkit-overflow-scrolling:touch
  }
  .nav::-webkit-scrollbar{display:none}
  .chip{
    flex:none;display:flex;align-items:center;gap:8px;height:40px;padding:0 15px;border-radius:999px;
    background:var(--creme);color:var(--g1);font-weight:700;font-size:14px;border:1.5px solid transparent;transition:.15s;white-space:nowrap
  }
  .chip .n{width:21px;height:21px;border-radius:50%;background:var(--cremef);color:var(--g1);
    display:grid;place-items:center;font-size:12px;font-weight:800}
  .chip.done .n{background:var(--vert);color:#fff}
  .chip.active{background:var(--nuit);color:#fff;border-color:var(--nuit)}
  .chip.active .n{background:rgba(255,255,255,.25);color:#fff}
  .chip.warn{border-color:var(--tomate);color:var(--tomate)}
  .chip.warn .n{background:var(--tomate);color:#fff}

  /* main */
  main{flex:1;padding:24px 16px 140px;max-width:920px;width:100%;margin:0 auto}
  .sec-head{margin-bottom:6px}
  .sec-kicker{font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--vert)}
  .sec-title{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1.15;margin:5px 0 4px}
  .sec-sub{color:var(--g1);font-size:15.5px;margin-bottom:20px}

  .card{background:var(--blanc);border:1px solid var(--cremef);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--sh)}
  .fld{margin-bottom:20px}
  .fld:last-child{margin-bottom:4px}
  label.q{display:block;font-weight:700;font-size:16.5px;margin-bottom:9px;color:var(--nuit2)}
  label.q .opt{font-weight:600;color:var(--g2);font-size:14px}
  input.t,textarea.t,select.t{
    width:100%;background:var(--creme);border:1.5px solid var(--cremef);border-radius:var(--rs);
    padding:13px 15px;min-height:var(--touch);transition:.15s;outline:none
  }
  input.t:focus,textarea.t:focus,select.t:focus{border-color:var(--vert);background:#fff;box-shadow:0 0 0 4px rgba(91,190,58,.13)}
  textarea.t{resize:none;overflow:hidden;line-height:1.5}
  select.t{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%235A6478' stroke-width='3'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 16px center;padding-right:42px}

  /* choice options */
  .opts{display:flex;flex-direction:column;gap:9px}
  .opts.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .ob{
    display:flex;align-items:center;gap:13px;min-height:var(--touch);padding:11px 15px;
    background:var(--creme);border:1.5px solid var(--cremef);border-radius:var(--rs);
    font-weight:600;font-size:15.5px;transition:.13s;user-select:none
  }
  .ob:active{transform:scale(.99)}
  .ob .mk{width:24px;height:24px;flex:none;border:2px solid var(--g3);background:#fff;display:grid;place-items:center;transition:.13s}
  .ob.cb .mk{border-radius:7px}
  .ob.rb .mk{border-radius:50%}
  .ob .mk svg{width:14px;height:14px;opacity:0;transform:scale(.5);transition:.13s;stroke:#fff;stroke-width:3.5}
  .ob.sel{background:var(--vert100);border-color:var(--vert);color:var(--vertf)}
  .ob.sel .mk{background:var(--vert);border-color:var(--vert)}
  .ob.sel .mk svg{opacity:1;transform:scale(1)}
  .ob.rb.sel .mk{background:#fff;border-color:var(--vert);box-shadow:inset 0 0 0 5px var(--vert)}
  .ob.rb.sel .mk svg{display:none}
  .sub{margin:9px 0 4px;padding-left:14px;border-left:3px solid var(--vert100);animation:rev .25s ease}
  @keyframes rev{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .sub-inline{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .sub-inline .miniq{font-weight:700;font-size:14px;color:var(--g1)}

  /* impact / coaching sous l'option sélectionnée (conseiller) */
  .ob-imp{display:none;font-size:13.5px;line-height:1.45;color:var(--g1);background:var(--creme);
    border-radius:9px;padding:9px 12px;margin:-3px 6px 9px;border-left:3px solid var(--g3)}
  .ob-imp.show{display:block;animation:rev .2s ease}
  .ob-imp b{font-weight:800}
  .ob-imp.good{background:var(--vert100);color:#2f6b1c;border-left-color:var(--vert)}
  .ob-imp.warn{background:var(--soleil100);color:#8a6010;border-left-color:var(--soleil)}
  .ob-imp.bad{background:var(--tomate100);color:#9B3115;border-left-color:var(--tomate)}

  /* questions à creuser (violet) */
  .qc{
    background:var(--violet100);border:1px solid #DCD0F2;border-left:5px solid var(--violet);
    border-radius:var(--rs);padding:17px 18px;margin-bottom:16px;position:relative
  }
  .qc-tag{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--violetf);margin-bottom:9px}
  .qc-q{font-family:var(--fd);font-weight:800;font-size:17.5px;line-height:1.3;color:var(--nuit2);margin-bottom:6px}
  .qc-hint{font-size:13.5px;color:var(--violetf);background:#fff;border-radius:8px;padding:9px 12px;margin:8px 0 12px;display:flex;gap:8px;line-height:1.45}
  .qc-hint b{flex:none}
  .qc textarea.t{background:#fff;border-color:#DCD0F2}
  .qc textarea.t:focus{border-color:var(--violet);box-shadow:0 0 0 4px rgba(110,79,176,.13)}

  /* insight (pédago, 2 camps) */
  .insight{
    display:flex;gap:13px;background:linear-gradient(135deg,#FFFDF6,var(--soleil100));
    border:1px solid #F0DCA8;border-radius:var(--r);padding:16px 18px;margin-bottom:16px
  }
  .insight .ic{width:38px;height:38px;flex:none;border-radius:11px;background:var(--soleil);display:grid;place-items:center;font-size:20px}
  .insight h4{font-family:var(--fd);font-size:15px;font-weight:800;margin-bottom:3px;color:var(--nuit2)}
  .insight p{font-size:14.5px;color:#7A5A12;line-height:1.5}

  .banner{display:flex;gap:12px;align-items:center;background:var(--tomate100);border:1px solid #F3C4B7;
    border-left:5px solid var(--tomate);border-radius:var(--rs);padding:14px 16px;margin-bottom:16px;
    font-weight:700;color:#9B3115;font-size:15px}

  /* repeat blocks */
  .rep{background:var(--creme);border:1px solid var(--cremef);border-radius:var(--rs);padding:16px;margin-bottom:12px}
  .rep-h{font-family:var(--fd);font-weight:800;font-size:15px;color:var(--vert);margin-bottom:13px;display:flex;align-items:center;gap:9px}
  .rep-h .rn{width:26px;height:26px;border-radius:8px;background:var(--vert);color:#fff;display:grid;place-items:center;font-size:14px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  /* bottom nav */
  .botnav{
    position:fixed;left:0;right:0;bottom:0;z-index:97;background:rgba(255,255,255,.94);
    backdrop-filter:blur(10px);border-top:1px solid var(--cremef);
    padding:12px 16px calc(env(safe-area-inset-bottom,0px) + 12px);
    display:flex;align-items:center;gap:12px;max-width:920px;margin:0 auto
  }
  .nbtn{height:54px;border-radius:13px;font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;gap:9px;transition:.15s}
  .nbtn.prev{flex:none;width:54px;background:var(--creme);color:var(--nuit);border:1.5px solid var(--cremef)}
  .nbtn.next{flex:1;background:var(--nuit);color:#fff}
  .nbtn.next:hover{background:var(--bleuc)}
  .nbtn.fin{background:var(--vert);color:#06270a}
  .nbtn:disabled{opacity:.4}
  .stepc{font-size:13px;font-weight:800;color:var(--g1);flex:none;text-align:center;min-width:54px}
  .stepc b{display:block;color:var(--nuit);font-size:16px}

  /* strat fab + drawer */
  .fab{
    position:fixed;right:16px;bottom:calc(env(safe-area-inset-bottom,0px) + 86px);z-index:96;
    height:50px;padding:0 18px;border-radius:999px;background:var(--nuit);color:#fff;
    font-weight:800;font-size:14px;display:flex;align-items:center;gap:9px;box-shadow:var(--shl)
  }
  .fab .cnt{background:var(--soleil);color:#3a2a00;border-radius:999px;min-width:22px;height:22px;
    display:grid;place-items:center;font-size:12.5px;padding:0 6px}
  .fab.alarm{background:var(--tomate);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(230,85,51,.5)}50%{box-shadow:0 0 0 12px rgba(230,85,51,0)}}

  .scrim{position:fixed;inset:0;background:rgba(10,20,40,.5);z-index:400;opacity:0;pointer-events:none;transition:.2s}
  .scrim.show{opacity:1;pointer-events:auto}
  .drawer{
    position:fixed;top:0;right:0;bottom:0;width:min(440px,92vw);background:var(--creme);z-index:401;
    transform:translateX(102%);transition:transform .28s var(--ff,ease);display:flex;flex-direction:column;box-shadow:var(--shl)
  }
  .drawer.show{transform:none}
  .dh{padding:calc(env(safe-area-inset-top,0px) + 18px) 20px 16px;background:var(--nuit);color:#fff;display:flex;align-items:center;justify-content:space-between}
  .dh h3{font-size:19px;font-weight:800}
  .dx{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.12);color:#fff;display:grid;place-items:center;font-size:20px}
  .dbody{flex:1;overflow:auto;padding:18px}
  .al{background:#fff;border-radius:12px;padding:14px 15px;margin-bottom:12px;border-left:5px solid var(--g3);box-shadow:var(--sh)}
  .al.hot{border-left-color:var(--tomate)}
  .al.warm{border-left-color:var(--soleil)}
  .al.good{border-left-color:var(--vert)}
  .al .alt{font-weight:800;font-size:15px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .al .alm{font-size:14px;color:var(--g1);line-height:1.45}
  .al .ala{font-size:13.5px;font-weight:700;color:var(--nuit);background:var(--bleu100);border-radius:8px;padding:8px 11px;margin-top:9px}
  .al-empty{text-align:center;color:var(--g2);padding:40px 16px;font-size:15px}

  /* fiches list */
  .fitem{background:#fff;border-radius:12px;padding:15px;margin-bottom:11px;box-shadow:var(--sh);display:flex;align-items:center;gap:12px}
  .fitem .fi-main{flex:1;min-width:0}
  .fitem .fi-n{font-weight:800;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fitem .fi-d{font-size:13px;color:var(--g2);margin-top:2px}
  .fitem.cur{outline:2px solid var(--vert)}
  .fi-act{display:flex;gap:7px}
  .iconb{width:42px;height:42px;border-radius:10px;background:var(--creme);display:grid;place-items:center;color:var(--g1)}
  .iconb.del:hover{background:var(--tomate100);color:var(--tomate)}
  .iconb svg{width:19px;height:19px}
  .bigb{width:100%;height:52px;border-radius:12px;background:var(--vert);color:#06270a;font-weight:800;font-size:16px;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:9px}

  /* vitrine preview */
  .vit-wrap{margin-bottom:16px}
  .vit{
    border-radius:18px;overflow:hidden;box-shadow:var(--shl);max-width:340px;margin:0 auto;
    border:8px solid #11151f;background:#fff
  }
  .vit-bar{height:26px;background:#11151f;display:flex;align-items:center;justify-content:center}
  .vit-bar i{width:54px;height:5px;border-radius:5px;background:#3a4150}
  .vit-hero{padding:30px 20px 24px;color:#fff;text-align:center;background-size:cover;background-position:center;position:relative}
  .vit-emoji{font-size:40px}
  .vit-logo{display:inline-flex;align-items:center;gap:6px;font-family:var(--fd);font-weight:800;font-size:11px;letter-spacing:.14em;text-transform:uppercase;background:rgba(255,255,255,.18);backdrop-filter:blur(2px);padding:5px 13px;border-radius:999px;margin-bottom:10px}
  .vit-logo i{width:7px;height:7px;border-radius:50%;background:var(--vert)}
  .vit-th.photo{background-size:cover;background-position:center}
  .vit-name{font-family:var(--fd);font-size:23px;font-weight:800;margin:6px 0 3px;letter-spacing:-.02em}
  .vit-tag{font-size:13px;opacity:.9}
  .vit-body{padding:16px;background:#fff}
  .vit-prod{display:flex;align-items:center;gap:11px;border:1px solid #eee;border-radius:12px;padding:10px;margin-bottom:9px}
  .vit-th{width:42px;height:42px;border-radius:9px;display:grid;place-items:center;font-size:20px}
  .vit-prod b{font-size:14px;display:block}
  .vit-prod span{font-size:12.5px;color:#8a8a8a}
  .vit-cta{height:44px;border-radius:11px;color:#fff;font-weight:800;font-size:15px;display:grid;place-items:center;margin-top:4px}
  .vit-cap{text-align:center;font-size:13px;color:var(--g1);margin-top:12px;font-weight:600}

  /* synthèse */
  .syn-hero{background:linear-gradient(140deg,var(--nuit),var(--bleuc));color:#fff;border-radius:var(--rl);padding:26px 22px;margin-bottom:18px}
  .syn-hero .t{font-size:13px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--soleil)}
  .syn-hero h2{font-size:27px;font-weight:800;margin:7px 0 4px;letter-spacing:-.02em}
  .syn-hero p{color:#BFD0E8;font-size:15px}
  .temp{display:inline-flex;align-items:center;gap:9px;margin-top:14px;background:rgba(255,255,255,.12);border-radius:999px;padding:8px 16px;font-weight:800;font-size:15px}
  .syn-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .syn-c{background:#fff;border:1px solid var(--cremef);border-radius:var(--r);padding:18px;box-shadow:var(--sh)}
  .syn-c h3{font-family:var(--fd);font-size:13px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--vert);margin-bottom:11px;display:flex;align-items:center;gap:8px}
  .syn-c ul{list-style:none;display:flex;flex-direction:column;gap:9px}
  .syn-c li{font-size:14.5px;line-height:1.45;padding-left:20px;position:relative;color:var(--nuit2)}
  .syn-c li::before{content:"";position:absolute;left:2px;top:8px;width:7px;height:7px;border-radius:50%;background:var(--soleil)}
  .syn-c li.q::before{background:var(--violet)}
  .syn-c .none{color:var(--g2);font-size:14px;font-style:italic;padding-left:0}
  .syn-c .none::before{display:none}
  .pill{display:inline-block;background:var(--vert100);color:var(--vertf);font-weight:800;font-size:13px;padding:5px 11px;border-radius:999px;margin:0 6px 6px 0}
  .pill.v{background:var(--violet100);color:var(--violetf)}
  .pill.s{background:var(--soleil100);color:#8a6010}

  .toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 150px);transform:translateX(-50%) translateY(20px);
    background:var(--nuit2);color:#fff;font-weight:700;font-size:14.5px;padding:13px 22px;border-radius:999px;
    z-index:500;opacity:0;pointer-events:none;transition:.25s;box-shadow:var(--shl)}
  .toast.show{opacity:1;transform:translateX(-50%)}

  .hidden{display:none!important}
  body.mode-commercant .conseiller-only{display:none!important}

  /* tablette large */
  @media (min-width:900px){
    main{padding:32px 24px 150px}
    .sec-title{font-size:34px}
    .opts.grid{grid-template-columns:1fr 1fr 1fr}
  }
  @media (max-width:560px){
    .row2,.opts.grid{grid-template-columns:1fr}
    .syn-grid{grid-template-columns:1fr}
    .brand small{display:none}
    body{font-size:16px}
  }

  /* ───── PRINT / PDF ───── */
  #print-root{display:none}
  @media print{
    @page{margin:14mm}
    body{background:#fff;font-size:11.5pt}
    .app,.scrim,.drawer,.fab,.toast{display:none!important}
    #print-root{display:block}
    .p-cover{text-align:center;padding:40px 0 30px;border-bottom:3px solid #0F2C52;margin-bottom:24px}
    .p-cover .pb{font-family:var(--fd);font-size:30pt;font-weight:800;color:#0F2C52}
    .p-cover .ps{font-size:11pt;letter-spacing:.2em;text-transform:uppercase;color:#5BBE3A;font-weight:800;margin-top:4px}
    .p-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px 30px;margin-top:22px;text-align:left;font-size:11pt}
    .p-meta div{border-bottom:1px solid #ddd;padding:5px 0}
    .p-meta b{color:#0F2C52}
    .p-sec{break-inside:avoid;margin-bottom:18px}
    .p-sec h2{font-family:var(--fd);font-size:14pt;color:#0F2C52;border-bottom:2px solid #E5E2D8;padding-bottom:5px;margin-bottom:10px}
    .p-q{margin-bottom:9px;break-inside:avoid}
    .p-q .pq{font-weight:700;font-size:10.5pt;color:#0A1428}
    .p-q .pa{font-size:11pt;color:#222;white-space:pre-wrap;padding:3px 0 0 0;border-bottom:1px dotted #ccc;min-height:14pt}
    .p-q.pqc .pq{color:#5A3E96}
    .p-q .pa.empty{color:#bbb}
    .p-syn{break-inside:avoid;background:#F7F2E8;border:1px solid #E5E2D8;border-radius:8px;padding:14px 16px;margin-bottom:14px}
    .p-syn h3{font-family:var(--fd);font-size:12pt;color:#5BBE3A;margin-bottom:6px}
    .p-syn ul{margin-left:18px;font-size:11pt}
  }
</style>
</head>

   ============================================================ */
const LS_KEY = "marcheo_audit_v4";
let store = loadStore();
let fiche = null;        // {id,data,createdAt,updatedAt}
let cur = 0;             // index section (parmi sections visibles)
let mode = store.mode || "conseiller";
let saveT = null;

function loadStore(){
  try{ return JSON.parse(localStorage.getItem(LS_KEY)) || {fiches:[],currentId:null}; }
  catch(e){ return {fiches:[],currentId:null}; }
}
function persist(){
  store.mode = mode;
  try{ localStorage.setItem(LS_KEY, JSON.stringify(store)); }catch(e){}
}
function uid(){ return "f"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function newFiche(){
  fiche = {id:uid(), data:{}, createdAt:Date.now(), updatedAt:Date.now()};
  store.fiches.unshift(fiche); store.currentId = fiche.id;
  persist();
}
function loadFiche(id){
  const f = store.fiches.find(x=>x.id===id);
  if(f){ fiche=f; store.currentId=id; cur=0; persist(); render(); closeAll(); }
}
function ensureFiche(){
  if(store.currentId){ fiche = store.fiches.find(x=>x.id===store.currentId); }
  if(!fiche){ newFiche(); }
}
function val(id){ return fiche.data[id]; }
function setVal(id,v){
  if(v===""||v==null||(typeof v==="object"&&!Object.keys(v).length)) delete fiche.data[id];
  else fiche.data[id]=v;
  fiche.updatedAt=Date.now();
  markDirty();
}
function markDirty(){
  const si=document.getElementById("saveInd");
  si.classList.add("dirty"); si.querySelector("span").textContent="…";
  clearTimeout(saveT);
  saveT=setTimeout(()=>{
    persist();
    si.classList.remove("dirty"); si.querySelector("span").textContent="Enregistré";
    refreshChrome();
  },550);
}

/* ============================================================
   SECTIONS VISIBLES (selon le mode)
   ============================================================ */
function sections(){
  return SCHEMA.filter(s => mode==="conseiller" || !s.conseiller);
}

/* ============================================================
   RENDU
   ============================================================ */
const main = document.getElementById("main");

function render(){
  const secs = sections();
  if(cur>=secs.length) cur=secs.length-1;
  if(cur<0) cur=0;
  const s = secs[cur];
  document.body.classList.toggle("mode-commercant", mode==="commercant");

  let html = `<div class="sec-head">
      <div class="sec-kicker">${esc(s.kicker)}</div>
      <h1 class="sec-title">${esc(s.title)}</h1>
      <div class="sec-sub">${esc(s.sub)}</div>
    </div>`;

  if(s.synth){
    html += buildSynthesis();
  } else {
    s.blocks.forEach(b=>{ html += renderBlock(b); });
  }
  main.innerHTML = html;
  main.scrollTo?.(0,0); window.scrollTo(0,0);

  bind();
  applyConditionals();
  if(s.id==="identite") refreshVitrine();
  refreshChrome();
}

function renderBlock(b){
  if(b.k==="card") return `<div class="card">${b.fields.map(renderField).join("")}</div>`;
  if(b.k==="qc"){
    return `<div class="qc">
      <div class="qc-tag conseiller-only">🔍 Question à creuser — note SES mots exacts</div>
      <div class="qc-q">${esc(b.q)}</div>
      <div class="qc-hint conseiller-only"><b>💡</b><span>${esc(b.hint)}</span></div>
      <textarea class="t" data-id="${b.id}" rows="2" placeholder="Ses mots, tels quels…">${escA(val(b.id))}</textarea>
    </div>`;
  }
  if(b.k==="note"){
    return `<div class="insight"><div class="ic">${b.icon}</div><div><h4>${esc(b.title)}</h4><p>${esc(b.txt)}</p></div></div>`;
  }
  if(b.k==="banner"){
    return `<div class="banner conseiller-only">⚠️ ${esc(b.txt)}</div>`;
  }
  if(b.k==="vit"){
    return `<div class="vit-wrap" id="vitWrap"></div>`;
  }
  if(b.k==="rep"){
    let h=`<div class="card">`;
    for(let i=1;i<=b.n;i++){
      h+=`<div class="rep"><div class="rep-h"><span class="rn">${i}</span>${esc(b.title)} ${i}</div>`;
      h+=b.fields.map(f=>{
        const ff={...f,id:`${b.id}_${i}_${f.id}`};
        return renderField(ff);
      }).join("");
      h+=`</div>`;
    }
    return h+`</div>`;
  }
  return "";
}

function renderField(f){
  const v = val(f.id);
  if(f.type==="textarea"){
    return `<div class="fld"><label class="q">${esc(f.label)}</label>
      <textarea class="t" data-id="${f.id}" rows="2" placeholder="${esc(f.ph||"…")}">${escA(v)}</textarea></div>`;
  }
  if(f.type==="select"){
    const opts = `<option value="">— choisir —</option>`+f.opts.map(o=>
      `<option value="${o.v}"${v===o.v?" selected":""}>${esc(o.l)}</option>`).join("");
    return `<div class="fld"><label class="q">${esc(f.label)}</label>
      <select class="t" data-id="${f.id}">${opts}</select></div>`;
  }
  if(f.type==="check"||f.type==="radio"){
    const cv = v || (f.type==="check"?{}:"");
    const cls = f.type==="check"?"cb":"rb";
    const opts = f.opts.map(o=>{
      const on = f.type==="check" ? !!cv[o.v] : cv===o.v;
      let sub="";
      if(o.sub && on){
        sub=`<div class="sub" data-sub="${f.id}:${o.v}">`+o.sub.map(sf=>renderSub(sf)).join("")+`</div>`;
      } else if(o.sub){
        sub=`<div class="sub hidden" data-sub="${f.id}:${o.v}">`+o.sub.map(sf=>renderSub(sf)).join("")+`</div>`;
      }
      const imp = o.imp ? `<div class="ob-imp ${o.tone||""} conseiller-only${on?" show":""}" data-imp="${f.id}:${o.v}"><b>→</b> ${esc(o.imp)}</div>` : "";
      return `<label class="ob ${cls}${on?" sel":""}" data-grp="${f.id}" data-val="${o.v}" data-multi="${f.type==="check"?1:0}">
        <span class="mk"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7"/></svg></span>
        <span>${esc(o.l)}</span></label>${imp}${sub}`;
    }).join("");
    return `<div class="fld"><label class="q">${esc(f.label)}</label>
      <div class="opts${f.grid?" grid":""}">${opts}</div></div>`;
  }
  // text / tel / email / date / time
  return `<div class="fld"><label class="q">${esc(f.label)}</label>
    <input class="t" type="${f.inp||"text"}" data-id="${f.id}" value="${esc(v||"")}" placeholder="${esc(f.ph||"")}"></div>`;
}

function renderSub(sf){
  const v=val(sf.id);
  if(sf.type==="textarea")
    return `<div class="fld"><label class="q"><span class="opt">${esc(sf.label)}</span></label>
      <textarea class="t" data-id="${sf.id}" rows="2" placeholder="${esc(sf.ph||"…")}">${escA(v)}</textarea></div>`;
  if(sf.type==="radio")
    return `<div class="sub-inline"><span class="miniq">${esc(sf.label)}</span>`+
      sf.opts.map(o=>`<label class="ob rb${v===o.v?" sel":""}" data-grp="${sf.id}" data-val="${o.v}" data-multi="0" style="min-height:42px;padding:7px 13px">
        <span class="mk"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7"/></svg></span><span>${esc(o.l)}</span></label>`).join("")+`</div>`;
  return `<div class="fld" style="margin-bottom:6px"><label class="q"><span class="opt">${esc(sf.label)}</span></label>
    <input class="t" type="${sf.inp||"text"}" data-id="${sf.id}" value="${esc(v||"")}" placeholder="${esc(sf.ph||"")}"></div>`;
}

/* ============================================================
   BINDINGS
   ============================================================ */
function bind(){
  main.querySelectorAll("input.t,select.t").forEach(el=>{
    el.addEventListener("input",()=>{
      setVal(el.dataset.id, el.value);
      if(el.dataset.id==="type_commerce"||el.dataset.id==="nom_commerce") refreshVitrine();
    });
  });
  main.querySelectorAll("textarea.t").forEach(el=>{
    autogrow(el);
    el.addEventListener("input",()=>{ setVal(el.dataset.id, el.value); autogrow(el); });
  });
  main.querySelectorAll(".ob").forEach(el=>{
    el.addEventListener("click",()=>{
      const g=el.dataset.grp, vv=el.dataset.val, multi=el.dataset.multi==="1";
      if(multi){
        const o=val(g)||{};
        if(o[vv]) delete o[vv]; else o[vv]=true;
        setVal(g, Object.keys(o).length?o:"");
      } else {
        setVal(g, val(g)===vv ? "" : vv);
      }
      // mise à jour sur place : pas de re-render → la page ne bouge pas
      syncSelections();
      applyConditionals();
      refreshChrome();
    });
  });
}

function syncSelections(){
  main.querySelectorAll(".ob").forEach(o=>{
    const v=val(o.dataset.grp), ov=o.dataset.val;
    const on = (typeof v==="object"&&v) ? !!v[ov] : v===ov;
    o.classList.toggle("sel",on);
  });
  main.querySelectorAll("[data-imp]").forEach(d=>{
    const [g,ov]=d.dataset.imp.split(":"), v=val(g);
    const on = (typeof v==="object"&&v) ? !!v[ov] : v===ov;
    d.classList.toggle("show",on);
  });
}

function autogrow(el){ el.style.height="auto"; el.style.height=Math.max(el.scrollHeight,46)+"px"; }

function applyConditionals(){
  main.querySelectorAll("[data-sub]").forEach(d=>{
    const [g,v]=d.dataset.sub.split(":");
    const cv=val(g);
    const on = typeof cv==="object" && cv ? !!cv[v] : cv===v;
    d.classList.toggle("hidden",!on);
    if(on) d.querySelectorAll("textarea.t").forEach(autogrow);
  });
}

/* ============================================================

function buildSynthesis(){
  const d=fiche.data;
  const m=METIERS[d.type_commerce]||null;
  const nom=d.nom_commerce||"Le commerce";

  // température
  const tempMap={froid:["Froid","🧊"],curieux:["Tiède","🌤️"],interesse:["Chaud","🔥"],chaud:["Brûlant","🔥🔥"]};
  const probMap={faible:"Faible (<25%)",moyenne:"Moyenne (25-50%)",bonne:"Bonne (50-75%)",tres_bonne:"Très bonne (>75%)"};
  const temp=tempMap[d.pj_interet]||["À évaluer","•"];
  const prob=probMap[d.ev_proba]||"non évaluée";

  // douleurs détectées
  const pains=[];
  if(d.op_appels==="probleme"||d.op_appels==="beaucoup") pains.push("Appels chronophages");
  if(typeof d.vis_presence==="object"&&d.vis_presence&&d.vis_presence.pas_site) pains.push("Aucune présence en ligne");
  if((d.op_pertes||"").trim()) pains.push("Pertes de ventes : "+trunc(d.op_pertes,60));
  if(d.li_position==="aimerait") pains.push("Veut livrer mais pas outillé");
  if(d.op_cc==="pense") pains.push("Click & collect imaginé mais jamais lancé");
  if((d.op_douleurs||"").trim()) pains.push(trunc(d.op_douleurs,70));
  if((d.qc_dormir||"").trim()) pains.push("Peur profonde : "+trunc(d.qc_dormir,60));

  // plat principal
  let plat="Vitrine + click & collect à son nom";
  if(d.op_appels==="probleme"||d.op_appels==="beaucoup") plat="Click & collect (supprime les appels)";
  else if(d.li_position==="aimerait"||d.op_livraison==="regulier") plat="Module livraison cadré (zone + créneaux)";
  else if((d.qc_reviennent_pas||"").trim()) plat="Fidélisation + notifications clients";
  else if(typeof d.vis_presence==="object"&&d.vis_presence&&d.vis_presence.pas_site) plat="Vitrine en ligne + visibilité Google";

  // arguments dans SES mots
  const qcIds=["qc_choisissent_vous","qc_savent_pas","qc_supprimer_tache","qc_ca_perdu","qc_2h","qc_sousvalorise","qc_jamais_ose","qc_dormir","qc_different_200m","qc_invisibles","qc_retenir"];
  const words=qcIds.map(id=>d[id]&&d[id].trim()?`« ${trunc(d[id],90)} »`:null).filter(Boolean);

  // visuels (top5)

  // reco
  const recoNames=[];
  for(let i=1;i<=4;i++){ const n=d[`reco_${i}_nom`]; if(n) recoNames.push(n); }
  const recoState = !d.re_demande||d.re_demande==="non"
    ? `<span class="pill" style="background:var(--tomate100);color:#9B3115">⚠️ Reco non demandée — à rattraper</span>`
    : `<span class="pill">Reco demandée</span>`+ (recoNames.length?recoNames.map(n=>`<span class="pill v">${esc(n)}</span>`).join(""):` <span class="none" style="padding-left:0">aucun nom donné</span>`);

  const li=(arr,cls)=> arr.length?arr.map(x=>`<li class="${cls||""}">${esc(x)}</li>`).join(""):`<li class="none">À compléter pendant le RDV</li>`;

  return `
  <div class="syn-hero">
    <div class="t">Brief de préparation — Démo V2</div>
    <h2>${esc(nom)}${m?` · ${esc(m.label)} ${m.emoji}`:""}</h2>
    <p>Tout est tiré de SES réponses. Objectif : qu'il se dise « il m'a écouté ».</p>
    <div class="temp">${temp[1]} Température : ${esc(temp[0])} &nbsp;·&nbsp; Signature : ${esc(prob)}</div>
  </div>

  <div class="syn-grid">
    <div class="syn-c">
      <h3>🎯 Le plat principal de la démo</h3>
      <ul><li><b>${esc(plat)}</b></li>
      ${m?`<li>Partir du modèle <b>${esc(m.label)}</b> et le personnaliser à son nom.</li>`:""}</ul>
    </div>
    <div class="syn-c">
      <h3>🩹 Douleurs à rejouer</h3>
      <ul>${li(pains)}</ul>
    </div>
    <div class="syn-c">

      <ul>${li(words,"q")}</ul>
    </div>
    <div class="syn-c">
      <h3>🖼️ Visuels à intégrer</h3>

    </div>

      <h3>🤝 Recommandations</h3>
      <div>${recoState}</div>

      <h3>⛔ Ne pas oublier</h3>

  </div>`;
}

/* ============================================================
   CHROME (nav, progress, compteur, topbar)
   ============================================================ */
function fieldIds(s){
  const ids=[];
  (s.blocks||[]).forEach(b=>{
    if(b.k==="card") b.fields.forEach(f=>ids.push(f.id));
    else if(b.k==="qc") ids.push(b.id);
    else if(b.k==="rep") for(let i=1;i<=b.n;i++) b.fields.forEach(f=>ids.push(`${b.id}_${i}_${f.id}`));
  });
  return ids;
}
function secFilled(s){
  if(s.synth) return 0;
  const ids=fieldIds(s); if(!ids.length) return 0;
  const n=ids.filter(id=>{const v=fiche.data[id];return v&&(typeof v!=="object"||Object.keys(v).length)}).length;
  return n/ids.length;
}
function refreshChrome(){
  const secs=sections();
  // nav chips
  const nav=document.getElementById("nav");
  nav.innerHTML=secs.map((s,i)=>{
    const fill=secFilled(s);
    const done=fill>=.999 && !s.synth;
    const warn = s.id==="reco" && (!fiche.data.re_demande||fiche.data.re_demande==="non");
    return `<button class="chip${i===cur?" active":""}${done?" done":""}${warn?" warn":""}" data-go="${i}">
      <span class="n">${s.synth?"★":(done?"✓":i+1)}</span>${esc(shortTitle(s.title))}</button>`;
  }).join("");
  nav.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>{cur=+b.dataset.go;render();});
  const ac=nav.querySelector(".chip.active"); ac&&ac.scrollIntoView({inline:"center",block:"nearest",behavior:"smooth"});

  // progress global
  const tot=secs.filter(s=>!s.synth);
  const g=tot.reduce((a,s)=>a+secFilled(s),0)/Math.max(tot.length,1);
  document.getElementById("progBar").style.width=(g*100).toFixed(1)+"%";

  // compteur
  document.getElementById("stepNum").textContent=cur+1;
  document.getElementById("stepTot").textContent="/ "+secs.length;
  const prev=document.getElementById("prevBtn"), next=document.getElementById("nextBtn");
  prev.disabled=cur===0;
  if(cur===secs.length-1){ next.classList.add("fin"); next.innerHTML=`Terminé`; next.onclick=()=>toast("Fiche complète ✓ — pense au PDF"); }
  else { next.classList.remove("fin"); next.innerHTML=`Suivant <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg>`; next.onclick=()=>{cur++;render();}; }

  // topbar
  const nm=fiche.data.nom_commerce;
  document.getElementById("tbMid").textContent = nm ? nm : "Nouvelle fiche";
  document.getElementById("modeLbl").textContent = mode==="conseiller"?"Conseiller":"Commerçant";
  document.getElementById("modeBtn").classList.toggle("on",mode==="commercant");

  refreshStrat();
}
function shortTitle(t){ return t.replace(/^Audit /,"").replace(/ & .*/,"").replace(/Identité du commerce/,"Identité").replace(/Vision de la solution idéale/,"Vision"); }

/* ============================================================
   FICHES (drawer)
   ============================================================ */
function openFiches(){
  const list=document.getElementById("fichesList");
  if(!store.fiches.length){ list.innerHTML=`<div class="al-empty">Aucune fiche enregistrée.</div>`; }
  else list.innerHTML=store.fiches.map(f=>{
    const nm=f.data.nom_commerce||"Sans nom";
    const m=METIERS[f.data.type_commerce];
    const dt=new Date(f.updatedAt);
    return `<div class="fitem${f.id===fiche.id?" cur":""}">
      <span class="vit-th" style="width:42px;height:42px;background:var(--creme);border-radius:10px">${m?m.emoji:"🛍️"}</span>
      <div class="fi-main">
        <div class="fi-n">${esc(nm)}</div>
        <div class="fi-d">${m?esc(m.label)+" · ":""}maj ${dt.toLocaleDateString("fr-FR")} ${dt.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}</div>
      </div>
      <div class="fi-act">
        <button class="iconb" data-open="${f.id}" title="Ouvrir">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
        <button class="iconb del" data-del="${f.id}" title="Supprimer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button>
      </div></div>`;
  }).join("");
  list.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>loadFiche(b.dataset.open));
  list.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{
    if(!confirm("Supprimer définitivement cette fiche ?")) return;
    store.fiches=store.fiches.filter(x=>x.id!==b.dataset.del);
    if(fiche.id===b.dataset.del){ fiche=null; store.currentId=null; ensureFiche(); render(); }
    persist(); openFiches();
  });
  show("fichesDr");
}

/* ============================================================
   EXPORT PDF
   ============================================================ */
function exportPDF(){
  const d=fiche.data, m=METIERS[d.type_commerce];
  let H=`<div class="p-cover">
    <div class="pb">Marchéo</div><div class="ps">Fiche audit · RDV 1</div>
    <div class="p-meta">
      <div><b>Commerce :</b> ${esc(d.nom_commerce||"—")}</div>
      <div><b>Type :</b> ${m?esc(m.label):"—"}</div>
      <div><b>Responsable :</b> ${esc(d.responsable||"—")}</div>
      <div><b>Téléphone :</b> ${esc(d.telephone||"—")}</div>
      <div><b>Adresse :</b> ${esc(d.adresse||"—")}</div>
      <div><b>Date RDV :</b> ${esc(d.date_rdv||"—")} ${esc(d.heure_arrivee||"")}</div>
    </div></div>`;

  SCHEMA.forEach(s=>{
    if(s.synth) return;
    let body="";
    (s.blocks||[]).forEach(b=>{
      if(b.k==="qc"){
        body+=qline(b.q,d[b.id],true);
      } else if(b.k==="card"){
        b.fields.forEach(f=> body+=qline(f.label, fmt(f,d[f.id])) );
      } else if(b.k==="rep"){
        for(let i=1;i<=b.n;i++){
          const has=b.fields.some(f=>d[`${b.id}_${i}_${f.id}`]);
          if(!has) continue;
          body+=`<div class="p-q"><div class="pq">${esc(b.title)} ${i}</div></div>`;
          b.fields.forEach(f=> body+=qline("• "+f.label, fmt(f,d[`${b.id}_${i}_${f.id}`])) );
        }
      }
    });
    if(body) H+=`<div class="p-sec"><h2>${esc(s.title)}</h2>${body}</div>`;
  });

  // synthèse
  const tmp=document.createElement("div"); tmp.innerHTML=buildSynthesis();
  let synTxt="";
  tmp.querySelectorAll(".syn-c").forEach(c=>{
    const h=c.querySelector("h3").textContent;
    const items=[...c.querySelectorAll("li")].map(li=>li.textContent).filter(t=>t&&!/^À compléter/.test(t));
    synTxt+=`<h3>${esc(h)}</h3><ul>${items.map(t=>`<li>${esc(t)}</li>`).join("")||"<li>—</li>"}</ul>`;
  });
  H+=`<div class="p-syn"><h2 style="font-family:var(--fd);color:#0F2C52;border-bottom:2px solid #E5E2D8;padding-bottom:5px;margin-bottom:8px">★ Synthèse RDV 2</h2>${synTxt}</div>`;

  document.getElementById("print-root").innerHTML=H;
  closeAll();
  setTimeout(()=>window.print(),120);
}
function qline(q,a,isQc){
  const empty=!a||!a.toString().trim();
  return `<div class="p-q${isQc?" pqc":""}"><div class="pq">${esc(q)}</div><div class="pa${empty?" empty":""}">${empty?"—":esc(a.toString())}</div></div>`;
}
function fmt(f,v){
  if(v==null||v==="") return "";
  if(f.type==="check"&&typeof v==="object"){
    return f.opts.filter(o=>v[o.v]).map(o=>{
      let s=o.l;
      if(o.sub) o.sub.forEach(sf=>{ if(fiche.data[sf.id]) s+=` (${fiche.data[sf.id]})`; });
      return s;
    }).join(" · ");
  }
  if((f.type==="radio"||f.type==="select")&&f.opts){
    const o=f.opts.find(x=>x.v===v); let s=o?o.l:v;
    if(o&&o.sub) o.sub.forEach(sf=>{ if(fiche.data[sf.id]) s+=` — ${fiche.data[sf.id]}`; });
    return s;
  }
  return v;
}

/* ============================================================
   UI : drawers, mode, toast, utils
   ============================================================ */
const scrim=document.getElementById("scrim");
function show(id){ document.getElementById(id).classList.add("show"); scrim.classList.add("show"); }
function closeAll(){ document.querySelectorAll(".drawer").forEach(d=>d.classList.remove("show")); scrim.classList.remove("show"); }
scrim.onclick=closeAll;
document.querySelectorAll("[data-close]").forEach(b=>b.onclick=closeAll);
document.getElementById("fab").onclick=()=>{ refreshStrat(); show("stratDr"); };
document.getElementById("fichesBtn").onclick=openFiches;
document.getElementById("pdfBtn").onclick=exportPDF;
document.getElementById("newFiche").onclick=()=>{ newFiche(); cur=0; render(); closeAll(); toast("Nouvelle fiche créée"); };
document.getElementById("modeBtn").onclick=()=>{
  mode = mode==="conseiller"?"commercant":"conseiller";
  if(mode==="commercant") toast("Vue commerçant — stratégie masquée 👀");
  else toast("Vue conseiller");
  cur=0; persist(); render();
};
document.getElementById("prevBtn").onclick=()=>{ if(cur>0){cur--;render();} };

let toastT=null;
function toast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2400);
}
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function escA(s){ return esc(s); }
function trunc(s,n){ s=(s||"").toString().trim(); return s.length>n?s.slice(0,n-1)+"…":s; }
function shade(hex,p){ const n=parseInt(hex.slice(1),16);let r=(n>>16)+p,g=(n>>8&255)+p,b=(n&255)+p;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return"#"+(r<<16|g<<8|b).toString(16).padStart(6,"0"); }
function hexA(hex,a){ const n=parseInt(hex.slice(1),16); return`rgba(${n>>16},${n>>8&255},${n&255},${a})`; }

   BOOT
   ============================================================ */
ensureFiche();
render();
window.addEventListener("beforeunload",persist);
