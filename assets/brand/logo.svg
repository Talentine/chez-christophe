<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 88" role="img" aria-label="Marchéo.fr">
  <defs>
    <linearGradient id="bagGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A6FBF"/>
      <stop offset="100%" stop-color="#1B3F6E"/>
    </linearGradient>
    <linearGradient id="truckGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7DD960"/>
      <stop offset="100%" stop-color="#5BBE3A"/>
    </linearGradient>
    <radialGradient id="bgGlow2" cx="0.3" cy="0.25" r="0.9">
      <stop offset="0%" stop-color="#1B3F6E"/>
      <stop offset="100%" stop-color="#0F2C52"/>
    </radialGradient>
  </defs>

  <!-- Cercle icône (44px) -->
  <g transform="translate(0, 0)">
    <circle cx="44" cy="44" r="44" fill="url(#bgGlow2)"/>
    <g transform="translate(22, 21) scale(0.22)">
      <!-- Sac -->
      <g transform="translate(50, 48)">
        <path d="M 22 14 Q 22 2 36 2 Q 50 2 50 14 L 50 22" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round"/>
        <path d="M 4 18 L 68 18 L 63 78 Q 62 84 56 84 L 16 84 Q 10 84 9 78 Z" fill="url(#bagGrad2)" stroke="#FFFFFF" stroke-width="9"/>
      </g>
      <!-- Camion -->
      <g transform="translate(50, 100)">
        <rect x="0" y="8" width="62" height="42" rx="5" fill="url(#truckGrad2)" stroke="#FFFFFF" stroke-width="9"/>
        <path d="M 62 20 L 86 20 Q 92 20 92 26 L 92 50 L 62 50 Z" fill="url(#truckGrad2)" stroke="#FFFFFF" stroke-width="9"/>
        <path d="M 65 24 L 84 24 Q 87 24 87 27 L 87 36 L 65 36 Z" fill="rgba(255,255,255,0.35)"/>
        <circle cx="16" cy="52" r="7" fill="#0F2C52" stroke="#FFFFFF" stroke-width="6"/>
        <circle cx="74" cy="52" r="7" fill="#0F2C52" stroke="#FFFFFF" stroke-width="6"/>
        <g transform="translate(22, 14)">
          <path d="M 9 0 C 14 0 18 4 18 9 C 18 15 9 26 9 26 C 9 26 0 15 0 9 C 0 4 4 0 9 0 Z" fill="#FFFFFF"/>
          <circle cx="9" cy="9" r="3.5" fill="#5BBE3A"/>
        </g>
      </g>
      <!-- Check -->
      <g transform="translate(140, 60)">
        <circle cx="16" cy="16" r="16" fill="#5BBE3A" stroke="#FFFFFF" stroke-width="11"/>
        <path d="M 9 16 L 14 21 L 23 11" fill="none" stroke="#FFFFFF" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="104" y="56"
        font-family="Manrope, system-ui, sans-serif"
        font-weight="800" font-size="40"
        fill="#0F2C52" letter-spacing="-1.2">Marchéo</text>
  <text x="272" y="56"
        font-family="Manrope, system-ui, sans-serif"
        font-weight="700" font-size="40"
        fill="#5BBE3A" letter-spacing="-0.6">.fr</text>
</svg>
